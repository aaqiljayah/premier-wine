<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#4c0743"/>

  <!-- Wine glass silhouette in gold, centered -->
  <!-- Bowl: rounded trapezoid shape -->
  <path d="
    M18 10
    L46 10
    Q44 22 38 28
    Q35 31 35 34
    L35 42
    L29 42
    L29 34
    Q29 31 26 28
    Q20 22 18 10
    Z
  " fill="#f5a800"/>

  <!-- Stem -->
  <rect x="30.5" y="42" width="3" height="10" fill="#f5a800"/>

  <!-- Base -->
  <ellipse cx="32" cy="52.5" rx="8" ry="2.5" fill="#f5a800"/>

  <!-- Wine fill inside bowl — slightly darker gold / wine red tone -->
  <clipPath id="bowl-clip">
    <path d="
      M18 10
      L46 10
      Q44 22 38 28
      Q35 31 35 34
      L29 34
      Q29 31 26 28
      Q20 22 18 10
      Z
    "/>
  </clipPath>
  <rect x="18" y="22" width="28" height="20" fill="#8b0a3a" opacity="0.6" clip-path="url(#bowl-clip)"/>

  <!-- Subtle wave on wine surface -->
  <path d="M21 22 Q27 19 32 22 Q37 25 43 22" stroke="#f5a800" stroke-width="1.2" fill="none" opacity="0.7" clip-path="url(#bowl-clip)"/>
</svg>
